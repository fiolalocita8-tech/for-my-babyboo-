<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Arab Boy</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Times New Roman',serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: radial-gradient(circle at 20% 30%, #2b0a4f, #05010f, #000);
}

/* stars */
.stars,.stars2,.stars3{
  position:fixed;
  width:100%;
  height:100%;
}

.stars::after,.stars2::after,.stars3::after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

.stars::after{
  width:2px;height:2px;
  box-shadow:10vw 20vh #fff,30vw 40vh #fff,50vw 10vh #fff;
}

.stars2::after{
  width:1.5px;height:1.5px;
  box-shadow:15vw 25vh #c9c9ff,55vw 15vh #c9c9ff;
}

.stars3::after{
  width:1px;height:1px;
  box-shadow:5vw 15vh #a78bfa,65vw 75vh #a78bfa;
}

.slide{
  position:absolute;
  width:90%;
  max-width:700px;
  padding:30px;
  opacity:0;
  transition:1s;
}

.slide.active{
  opacity:1;
}

.text{
  font-size:18px;
  line-height:1.9;
  white-space:pre-wrap;
}

.opening{
  font-size:28px;
  text-align:center;
}

.ending{
  text-align:center;
  font-size:20px;
  line-height:1.8;
  padding:0 10px;
}

.cursor::after{
  content:"|";
  animation:blink .7s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>
