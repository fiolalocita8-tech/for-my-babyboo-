<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Abud </title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0a0f2c, #000);
  overflow: hidden;
  color: white;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: moveStars 80s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

/* CARD FIX BIAR GA TURUN */
.card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 20px;
  width: 330px;
  height: 400px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TEXT */
#text {
  font-size: 14px;
  line-height: 1.6;
  overflow-y: auto;
  flex-grow: 1;
  animation: pulse 1.5s infinite;
}

#text p {
  margin-bottom: 10px;
}

/* PULSE AWAL */
@keyframes pulse {
  0% {opacity: 0.5;}
  50% {opacity: 1;}
  100% {opacity: 0.5;}
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #ff1a8c;
}

/* NO BUTTON */
.no {
  position: absolute;
}

/* HEART */
.heart {
  position: fixed;
  animation: fall linear infinite;
}

@keyframes fall {
  from {transform: translateY(-100px);}
  to {transform: translateY(100vh);}
}

/* ENDING */
.ending {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #050816, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: 2s;
  z-index: 10;
}

.ending.show {
  opacity: 1;
  pointer-events: all;
}

.ending h1 {
  font-size: 22px;
  text-shadow: 0 0 10px rgba(255,255,255,0.8),
               0 0 20px rgba(255,255,255,0.6);
}

/* TYPING */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% {border-color: transparent;}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">
  <div id="text">klik aku 🤍</div>

  <div>
    <button onclick="nextText()">lanjut 💖</button><br>
    <button onclick="love()">aku sayang kamu nya will be soon ya</button>
    <button class="no" onmouseover="moveBtn(this)">gamau 😝</button>
  </div>
</div>

<!-- ENDING -->
<div class="ending" id="ending">
  <h1>
    i am so proud of you sayang 🫶🏻<br><br>
    thank you for staying… even when things weren’t easy 🤍
  </h1>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://files.catbox.moe/8l6u7v.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;

let texts = [
`happy birthday yaa sayang 🤍`,

`ih today is your special day yaa, bukan cuma karena kamu nambah umur, but because the world gets the current version of you… and i’m lucky enough to know you. i am so lucky to meet you.`,

`jujur ya, walaupun kita belum lama, but you already made me feel something different. you make me feel comfortable, and i just enjoy every moment when i’m around you… aneh sih, but yeah, kamu emang se-“itu” 😝`,

`i just want you to be happy, sesimpel itu. i hope everything you’re chasing slowly comes true, and i hope you always find a reason to smile, even on your hardest days yaa abud <3`,

`buttt… boleh ya aku sedikit cerewet 😤 when you’re upset, don’t be too harsh ya sayang. jangan langsung marah-marah, nono pundungan 😠 tapi jujur kamu lucu sih kalau gitu, makanya suka aku jailin wleee`,

`and also… please try to reduce smoking and coffee ya ganteng. i’m not trying to control you, aku cuma mau kamu tetep ada disini lebih lama dan sehat <3`,

`and one more thing… don’t skip meals ya, makan nasi yang bener. take care of your sleep schedule, jangan kebanyakan begadang, and please drink more water!!!! don’t wait until someone reminds you 😤`,

`kalau aku lagi ngingetin kamu, don’t be stubborn ya sayang… just listen a little, anggap aja itu karena aku care about you more than i should`,

`thank you for being you, with all your imperfections. funny thing is… i actually like all of it (and no, i won’t say this again, gengsi). you’re actually the lucky one 😏`,

`i hope on your birthday, you feel loved, appreciated, and reminded that you matter… at least to me <3`,

`once again, happy birthday sayang. i’m so proud of you for everything you’ve done, and i’ll always support you, no matter what 🤍`
];

let i = 0;

function nextText() {

  if (!started) {
    document.getElementById("music").play();
    started = true;
    document.getElementById("text").innerHTML = "";
  }

  if (i < texts.length - 1) {
    let p = document.createElement("p");
    p.classList.add("fade");
    p.innerText = texts[i];

    document.getElementById("text").appendChild(p);
    i++;
  } else if (i === texts.length - 1) {

    let p = document.createElement("p");
    p.classList.add("typing");
    document.getElementById("text").appendChild(p);

    let text = texts[i];
    let index = 0;

    let typing = setInterval(() => {
      p.innerText += text[index];
      index++;

      if (index >= text.length) {
        clearInterval(typing);

        setTimeout(() => {
          document.getElementById("ending").classList.add("show");

          let music = document.getElementById("music");
          let vol = music.volume;

          let fade = setInterval(() => {
            if (vol > 0.05) {
              vol -= 0.05;
              music.volume = vol;
            } else {
              music.volume = 0;
              clearInterval(fade);
            }
          }, 200);

        }, 2000);
      }
    }, 40);

    i++;
  }
}

/* LOVE BUTTON */
function love() {
  alert("cieee kamu juga sayang aku kan 😏💖
        ");
}

/* TOMBOL KABUR */
function moveBtn(btn) {
  btn.style.top = Math.random()*250 + "px";
  btn.style.left = Math.random()*250 + "px";
}

/* HATI */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100+"vw";
  heart.style.fontSize = (Math.random()*20+10)+"px";
  heart.style.animationDuration = (Math.random()*3+3)+"s";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);
</script>

</body>
</html>
