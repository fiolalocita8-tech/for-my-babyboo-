<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0a0f2c, #000);
  overflow: hidden;
  color: white;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: moveStars 80s linear infinite;
  pointer-events: none;
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  height: 420px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
}

/* TEXT */
#text {
  font-size: 14px;
  line-height: 1.6;
  overflow-y: auto;
  flex-grow: 1;
}

#text p {
  margin-bottom: 10px;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BUTTON WRAPPER */
.buttons {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* BUTTON */
button {
  width: 85%;
  padding: 10px;
  border: none;
  border-radius: 20px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #ff1a8c;
}

/* NO BUTTON */
.no {
  position: absolute;
}

/* ENDING */
.ending {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #050816, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: 2s;
  z-index: 10;
}

.ending.show {
  opacity: 1;
}

.ending h1 {
  font-size: 22px;
}

/* HEART */
.heart {
  position: fixed;
  animation: fall linear infinite;
}

@keyframes fall {
  from {transform: translateY(-100px);}
  to {transform: translateY(100vh);}
}

/* STARS ANIM */
@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">
  <div id="text">klik aku 🤍</div>

  <div class="buttons">
    <button onclick="nextText()">lanjut 💖</button>
    <button onclick="love()">aku sayang kamu 😳</button>
    <button class="no" onmouseover="moveBtn(this)">gamau 😝</button>
  </div>
</div>

<div class="ending" id="ending">
  <h1>
    i am so proud of you sayang 🫶🏻<br><br>
    thank you for staying… even when things weren’t easy 🤍
  </h1>
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/8l6u7v.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;

let texts = [
`happy birthday yaa sayang 🤍`,
`ih today is your special day yaa, bukan cuma karena kamu nambah umur, but because the world gets the current version of you… and i’m lucky enough to know you.`,
`jujur ya, walaupun kita belum lama, but you already made me feel something different.`,
`i just want you to be happy, sesimpel itu.`,
`buttt… boleh ya aku sedikit cerewet 😤`,
`and also… please try to reduce smoking`,
`and one more thing… don’t skip meals ya`,
`kalau aku lagi ngingetin kamu, jangan bandel ya`,
`thank you for being you`,
`i hope on your birthday, you feel loved`,
`once again, happy birthday sayang 🤍`
];

let i = 0;

function nextText() {
  if (!started) {
    document.getElementById("music").play();
    started = true;
    document.getElementById("text").innerHTML = "";
  }

  if (i < texts.length) {
    let p = document.createElement("p");
    p.classList.add("fade");
    p.innerText = texts[i];
    document.getElementById("text").appendChild(p);
    i++;
  } else {
    document.getElementById("ending").classList.add("show");
  }
}

function love() {
  alert("cieee 😏");
}

function moveBtn(btn) {
  btn.style.top = Math.random()*250 + "px";
  btn.style.left = Math.random()*250 + "px";
}

setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100+"vw";
  heart.style.animationDuration = "5s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},500);
</script>

</body>
</html>
