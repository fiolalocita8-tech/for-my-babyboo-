<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for babyboo 👻</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Times New Roman", serif;
  background: radial-gradient(circle at top,#1a0033,#000);
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 🌌 canvas galaxy */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* container */
.container{
  width:100%;
  max-width:400px;
  text-align:center;
}

/* slide */
.slide{
  position:absolute;
  width:100%;
  opacity:0;
  transition:0.6s;
}

.slide.active{ opacity:1; }

/* image */
img{
  width:160px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 25px rgba(255,255,255,0.2);
}

/* text */
h1{
  font-size:2.2em;
  margin-bottom:10px;
}

p{
  color:#ddd;
}

/* button */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background: linear-gradient(45deg,#ff66cc,#66ccff);
  color:white;
  cursor:pointer;
}

/* popup */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}

.overlay.show{
  opacity:1;
  pointer-events:all;
}

.popup{
  background:rgba(20,20,40,0.95);
  padding:20px;
  border-radius:20px;
  max-width:90%;
  max-height:70%;
  overflow-y:auto;
  text-align:left;
  box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.popup p{
  margin-bottom:12px;
  line-height:1.6;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<!-- slide 1 -->
<div class="slide active" id="s1">
  <img src="foto1.jpg">
  <h1>happy birthday babyboo 💖</h1>
  <p>for Farhan Abud ✨</p>
  <button onclick="go(2)">tap</button>
</div>

<!-- slide 2 -->
<div class="slide" id="s2">
  <img src="foto2.jpg">
  <h1>for my abud </h1>

  <audio id="music">
    <source src="A Sorrowful Reunion - Reality Club (Official Lyric Video) - (320 Kbps).mp3">
  </audio>

  <button onclick="playMusic()">play music 🎵</button>
  <button onclick="openPopup()">buka pesan 💌</button>
  <button onclick="go(3)">next</button>
</div>

<!-- slide 3 -->
<div class="slide" id="s3">
  <h1>thank you 🤍</h1>
  <p>makasih udah jadi bagian dari hidup aku 50% 😉</p>
</div>

</div>

<!-- popup -->
<div class="overlay" id="overlay">
  <div class="popup">
    <p>happy birthday yaa sayang 🤍</p>
    <p>ih today is your special day yaa 😖 bukan cuma karena kamu nambah umur...</p>
    <p>jujur ya... kamu emang se-“itu”</p>
    <p>please take care of yourself ya 🤍</p>
    <button onclick="closePopup()">close</button>
  </div>
</div>

<script>
function go(n){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

function playMusic(){
  document.getElementById('music').play();
}

function openPopup(){
  document.getElementById("overlay").classList.add("show");
}

function closePopup(){
  document.getElementById("overlay").classList.remove("show");
}

/* 🌌 BINTANG GERAK HALUS */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.2,
    d:Math.random()*0.3
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y+=s.d;
    if(s.y>c.height) s.y=0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
